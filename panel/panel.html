<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Net Assets Scraper</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <!-- Header -->
  <header class="panel-header">
    <div class="header-row">
      <div class="header-title">
        <h1>NAS<span class="accent">.</span></h1>
        <span class="version">v2</span>
      </div>
      <button class="filter-chip scan-chip" id="refreshBtn" title="Re-scan page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        <span>Scan</span>
      </button>
    </div>
    <p class="site-name" id="siteName">—</p>
  </header>

  <!-- Filter Chips -->
  <nav class="filter-bar" id="tabNav">
    <button class="filter-chip active" data-tab="all">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>All</span>
    </button>
    <button class="filter-chip" data-tab="image">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <span class="badge" id="badgeImage">0</span>
    </button>
    <button class="filter-chip" data-tab="video">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span class="badge" id="badgeVideo">0</span>
    </button>
    <button class="filter-chip" data-tab="font">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9.5" y1="20" x2="14.5" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      <span class="badge" id="badgeFont">0</span>
    </button>
    <button class="filter-chip" data-tab="colors">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
      <span>Brand</span>
    </button>
  </nav>

  <!-- Controls Bar -->
  <div class="controls-bar" id="controlsBar">
    <div class="controls-left">
      <label class="filter-toggle">
        <input type="checkbox" id="hideSmall" checked />
        <span>Hide tiny</span>
      </label>
      <label class="filter-toggle">
        <input type="checkbox" id="hideUI" checked />
        <span>Hide UI</span>
      </label>
    </div>
    <div class="controls-right">
      <button class="btn-ghost" id="selectAll">Select all</button>
      <button class="btn-ghost" id="selectNone">None</button>
    </div>
  </div>

  <!-- Asset Grid -->
  <main class="asset-grid" id="assetGrid">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"><circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10"/><path d="M12 2a15 15 0 0 0-4 10 15 15 0 0 0 4 10"/><path d="M2 12h20"/></svg>
      </div>
      <p>Browse a page to capture assets.</p>
      <p class="hint">Assets appear here as the page loads.</p>
    </div>
  </main>

  <!-- Colors Panel (hidden by default) -->
  <section class="colors-panel" id="colorsPanel" style="display: none;">
    <div class="colors-section">
      <h3>Brand Colors</h3>
      <p class="hint" id="colorsHint">Extracted from CSS variables, meta tags, and page analysis.</p>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="colors-section">
      <h3>Fonts Detected</h3>
      <div class="font-list" id="fontList"></div>
    </div>
    <div class="colors-section">
      <h3>Page Info</h3>
      <div class="meta-info" id="metaInfo"></div>
    </div>
  </section>

  <!-- Sticky Download Bar -->
  <footer class="download-bar" id="downloadBar">
    <div class="download-info">
      <span id="selectedCount">0 selected</span>
      <span class="download-size" id="selectedSize"></span>
    </div>
    <button class="btn-download" id="downloadBtn" disabled>
      Download Kit ↓
    </button>
    <!-- Progress overlay (hidden by default) -->
    <div class="download-progress" id="downloadProgress" style="display: none;">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-text" id="progressText">0 / 0</span>
    </div>
  </footer>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="../lib/jszip.min.js"></script>
  <script src="panel.js"></script>
</body>
</html>
